<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaBridge</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-frame">

    <header class="popup-header">
      <div class="popup-logo">
        <span class="popup-logo-icon">⬡</span>
        <span class="popup-logo-name">LinguaBridge</span>
      </div>
    </header>

    <main class="popup-main">
      <label class="popup-label" for="langue-select">
        <!-- Icône globe — label accessible sans texte en français dans le contrôle -->
        <span class="popup-label-icon" aria-hidden="true">🌐</span>
        <span class="sr-only">Langue cible</span>
      </label>

      <div class="popup-select-wrapper">
        <select id="langue-select" class="popup-select" aria-label="Choisir la langue de traduction">
          <!-- Rempli dynamiquement par popup.js -->
        </select>
        <span class="popup-select-arrow" aria-hidden="true">▾</span>
      </div>

      <div id="popup-status" class="popup-status" aria-live="polite"></div>
    </main>

    <footer class="popup-footer">
      <button id="export-btn" class="popup-export-btn" title="Exporter le carnet (CSV Anki)">
        <span class="popup-export-icon" aria-hidden="true">⬇</span>
        <span id="vocab-count" class="popup-export-count">…</span>
      </button>
    </footer>

  </div>
  <script src="popup.js"></script>

<footer style="text-align:center;padding:1.5rem;margin-top:3rem;font-size:0.85rem;color:#666;border-top:1px solid #e0e0e0;font-family:sans-serif;">
  <a href="https://www.linkedin.com/in/antonin-bareau/" target="_blank" rel="noopener" style="color:#0077b5;text-decoration:none;font-weight:bold;">Antonin Bareau</a>
  &nbsp;&mdash;&nbsp;
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">
    <img src="https://licensebuttons.net/l/by-sa/4.0/80x15.png" alt="CC BY-SA 4.0" style="vertical-align:middle;border:0;">
  </a>
</footer>
</body>
</html>
